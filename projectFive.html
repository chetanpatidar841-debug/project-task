<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>My E-Commerce Store</h1>
</header>

<main>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200" alt="Product">
<h3>Laptop</h3>
<p>₹50,000</p>
<button>Add To Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200" alt="Product">
<h3>Mobile</h3>
<p>₹20,000</p>
<button>Add To Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200" alt="Product">
<h3>Headphones</h3>
<p>₹2,000</p>
<button>Add To Cart</button>
</div>

</div>

</main>

<footer>
<p>© 2026 E-Commerce Store</p>
</footer>

<script src="script.js">
    const buttons =
document.querySelectorAll("button");

buttons.forEach(button=>{

button.addEventListener("click",()=>{

alert("Product Added To Cart");

});

});
</script>

</body>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f4f4;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
background:#333;
color:white;
}
</style>
</html>
