<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="toggleTheme()">Dark Mode</button>
</body>

<script>
    function toggleTheme(){
  document.body.classList.toggle("dark-mode");
}
</script>

<style>
    /* CSS Variables */
:root{
  --bg:#f4f4f4;
  --text:#222;
  --card:#fff;
  --primary:#2563eb;
}

.dark-mode{
  --bg:#121212;
  --text:#ffffff;
  --card:#1e1e1e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

/* Header */
header{
  background:var(--primary);
  color:white;
  padding:20px;
}

header h1{
  text-align:center;
}

nav ul{
  list-style:none;
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:10px;
}

nav a{
  color:white;
  text-decoration:none;
}

/* Grid Layout */
main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

section{
  background:var(--card);
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

/* Projects */
.project-container{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

.project{
  flex:1;
  min-width:200px;
  padding:15px;
  border:1px solid #ddd;
  border-radius:8px;
}

/* Contact Form */
form{
  display:flex;
  flex-direction:column;
}

input,
textarea{
  padding:10px;
  margin:10px 0;
}

button{
  padding:10px;
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

button:hover{
  opacity:.9;
}

/* Footer */
footer{
  text-align:center;
  padding:20px;
  background:#333;
  color:white;
}

/* Mobile First Responsive */
@media(max-width:768px){

  main{
    grid-template-columns:1fr;
  }

  nav ul{
    flex-direction:column;
    align-items:center;
  }

  .project-container{
    flex-direction:column;
  }
}
</style>
</html>
