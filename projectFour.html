<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    
</head>
<body>
    <div class="container">
        <h1>Weather App</h1>
        <form action="#">
            <input id="city-name" type="text" placeholder="Enter Your City Name">
          <input type="submit" value="Get weather">
        </form>
        <div class="Weather-data">
            <div class="icon">
                <!-- <img src="http://openweathermap.org/img/wn/01d.png" alt=""> -->
            </div>
            <div class="temp"></div>
            <div class="desc"></div>
              <!-- <div class="temp">35c</div>
            <div class="desc">haze</div> -->

            <div class="details">
                <div> Feels Like: 35c</div>
                <div>Humidity: 45%</div>
                <div>wind Speed: 5 m/s</div>
            </div>
        </div>
    </div>
</body>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: cursive;
    }
    body{
        background-color: #96bdc6;
    }
    .container{
        background-color: #d5d3d3;
         max-width: 600px; 
         text-align: center;
         padding: 20px;
         box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
         margin: 20px auto;
         margin-top: 40px;
         border-radius: 10px;
    }
    form{
        display: flex;
        justify-content: space-around;
        margin: 30px;
        align-items: center;
    }
    form input[type="text"]{
        padding: 10px;
        font-size: 18px;
        width: 70%;
        border: none;
        outline: none;
        border-radius: 5px;
    }
    form input[type="Submit"]{
        padding: 10px 20px;
        border: none;
        background-color: #754e44;
        color: #fff;
        font-size: 18px;
        border-radius: 5x;
        transition: all 0.2s ease-in;
    }
    form input[type="Submit"]:hover{
        background-color: rgb(171,75,75);
        
    }

     

.icon img{
    width: 100px;
    height: 100px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center center;
    background-color: #d86052;
    border-radius: 100px;
}
.temp{
    font-size: 40px;
    font-weight: 1000;
    margin-top: 20px;
}

.desc{
    font-size: 30px;
    font-weight: 700;
    margin-top: 10px;
    margin-bottom: 20px;
}
.details{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
}
.details>div{
    font-size: 18px;
    background-color: #fff;
    padding: 20px;
    border-radius: 5px;
    margin: 10px;
    min-height: 40px;
    text-align: center;
    align-items: center;
    flex: 1;
}
</style>

<script>
    const apiKey = "20da423906ccf27bec8c2d81c8f4a2eb"
    const weadherDathaEle = document.querySelector(".weadher-data")
    const cityNameEle  =  document.querySelector("#city-name")
    const formEle = document.querySelector("form")
    const imagIcon = document.querySelector(".icon")
    formEle.addEventListener("submit",
        (e)=>{
            e.preventDefault()
            const cityValue = cityNameEle.value 
            getWeatherData(cityValue)
        }
    )

     async  function getWeatherData(){

        try{
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityValue}&appid=${apikey}&units=metric`)
        if(!response.ok){
            throw new Error("Network response is not ok!")
        }

        const data = await response.json()
        // console.log(data)
        const temprature = Math.floor(data.main.temp)
        const description = data.weather[0].description
        const icon = data.weather[0].icon
        weadherDathaEle.querySelector(".temp").textContent=`${temprature}`
        weadherDathaEle.querySelector(".desc").textContent=`${description}`
    }catch(err){

    }
}
 
</script>
</html>
